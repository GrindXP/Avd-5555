name: Android 14 Remote Emulator
on:
  workflow_dispatch:

jobs:
  android-remote:
    runs-on: macos-13
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-android

      - name: Enable SSH Access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist
          echo "SSH ready!"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write Server Files
        run: |
          mkdir -p /tmp/stream
          echo "" | base64 -d > /tmp/stream/server.py
          echo "" | base64 -d > /tmp/stream/index.html
          echo "Files ready!"

      - name: Boot Android 14 (Play Store) + Stream
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          heap-size: 512M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          disable-animations: true
          script: |
            echo "✅ Android 14 with Play Store booted!"
            adb shell input keyevent 82

            while true; do
              adb exec-out screencap -p > /tmp/stream/screen.png 2>/dev/null
              sleep 1
            done &

            python3 /tmp/stream/server.py &
            sleep 2

            TAILSCALE_IP=$(tailscale ip -4)
            echo "================================"
            echo "  Tunnel cmd (run on your PC):"
            echo "  ssh -i C:/Users/DELL/.ssh/vishesh-github-mac -L 9100:localhost:9100 -N runner@${TAILSCALE_IP}"
            echo "  Then open: http://localhost:9100"
            echo "================================"
            sleep 20000

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &
