name: Android 16 Remote Emulator
on:
  workflow_dispatch:

jobs:
  android-remote:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-android-runner

      - name: Enable SSH Access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist
          sleep 2
          echo "SSH ready!"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Stream Server Files
        run: |
          mkdir -p /tmp/stream

          # server.py as base64 (no << YAML conflict)
          echo "" | base64 -d > /tmp/stream/server.py

          # index.html as base64
          echo "" | base64 -d > /tmp/stream/index.html

          echo "Files ready!"

      - name: Start Android 16 Emulator + Stream
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: arm64-v8a
          profile: pixel_6
          ram-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "Emulator booted!"
            adb shell input keyevent 82

            # Start screenshot loop
            while true; do
              adb exec-out screencap -p > /tmp/stream/screen.png 2>/dev/null
              sleep 0.8
            done &

            # Start Python server
            python3 /tmp/stream/server.py &
            sleep 3
            echo "Stream ready on port 9100"

            # Keep alive
            sleep 20000

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          sudo caffeinate -dimsu &

      - name: Print Connection Info
        run: |
          TAILSCALE_IP=$(tailscale ip -4)
          echo "================================"
          echo "  SSH: ssh runner@${TAILSCALE_IP}"
          echo "  Tunnel: ssh -i C:/Users/DELL/.ssh/sshgithubmac -L 9100:localhost:9100 -N runner@${TAILSCALE_IP}"
          echo "  Browser: http://localhost:9100"
          echo "================================"
